<!DOCTYPE html>
<html lang="fr">

<head>
    <title>contact</title>
    <link rel="stylesheet" href="style1.css">
</head>

<body>
    <div class="form">
        <form action="">
            <h2>Bienvenue dans le formulaire !</h2>
            <h3>Merci de remplir les informations demandées</h3>
            <label for="Prénom">Prénom :</label>
            <input class="inp" id="Prénom" type="text" placeholder="Quel est votre prénom?">
            <br>
            <br>
            <label for="Nom">Nom :</label>
            <input class="inp" id="Nom" type="text" placeholder="Quel est votre Nom?">
            <br>
            <br>
            <label for="age">Age:</label>
            <select id="age">
                <option value="Entre 12 et 17">Entre 12 et 17 ans</option>
                <option value="Entre 18 et 25">Entre 18 et 25 ans</option>
                <option value="Entre 26 et 50">Entre 26 et 50 ans</option>
                <option value="Entre 51 et 70">Entre 51 et 70 ans</option>
                <option value="71 et plus">71+</option>
            </select>
            <br>
            <br>
            <label for="genre">Genre :</label>
            <input type="radio" name="type" value="Homme" id="homme">Homme</input>
            <input type="radio" name="type" value="Femme" id="femme">Femme</input>
            <input type="radio" name="type" value="Autre" id="autre">Autre</input>
            <br>
            <br>
            <label for="Email">Email:</label>
            <input class="inp" id="Email" type="email" placeholder="Quel est votre adresse e-mail?">
            <br>
            <br>
            <label for="Tarea">Ecrivez:</label>
            <textarea id="Tarea" placeholder="Ecrivez votre préoccupation" cols="70" row="200"></textarea>
            <br>
            <br>
            <input class="sbt" type="submit" value="Cliquez sur le bouton afin d'envoyer vos informations">


    </div>

    </section>

    </form>


</body>

</html>
